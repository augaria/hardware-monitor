# Hardware Monitor — per-agent alert threshold overrides
#
# Optional. If --thresholds points to this file, the central server uses these
# values when alerting on THIS machine. Any key you leave commented out (or
# blank) falls back to the central server's default for that metric, so you
# only need to specify the ones you want to change.
#
# Format: KEY=VALUE  (one per line, '#' starts a comment)
# Units : % for usage, °C for temperature.
# Apply : edit this file, then `sudo systemctl restart hardware-monitor-agent`.
#
# Recognized keys (uncomment + adjust the ones you want to override):

#ALERT_CPU_USAGE=85
#ALERT_CPU_TEMP=80
#ALERT_MEMORY_USAGE=75
#ALERT_MOTHERBOARD_TEMP=70
#ALERT_GPU_USAGE=90
#ALERT_GPU_TEMP=80
#ALERT_GPU_MEMORY=85
#ALERT_DISK_TEMP=55

# UI: arrays smaller than this many GB auto-collapse on the dashboard
# (along with detected SSD-cache arrays). Click "+ show N hidden" to expand.
# Falls back to the central server's HIDE_ARRAYS_BELOW_GB env var, then 10.
#HIDE_ARRAYS_BELOW_GB=10
